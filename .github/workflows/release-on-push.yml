name: Build and Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      # Extract version from csproj
      - name: Get Version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content "mitoSoft.Checklist/mitoSoft.Checklist.csproj"
          $version = $csproj.Project.PropertyGroup.Version
          if (!$version) { $version = "1.0.0" }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Check if Release exists
        id: check_release
        shell: pwsh
        run: |
          $tag = "v${{ steps.version.outputs.version }}"

          # Check if tag already exists
          git fetch --tags
          $tagExists = git tag -l $tag

          if ($tagExists) {
            Write-Host "Release $tag already exists - skipping"
            echo "exists=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Release $tag does not exist - will create"
            echo "exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Publish
        if: steps.check_release.outputs.exists == 'false'
        run: dotnet publish mitoSoft.Checklist/mitoSoft.Checklist.csproj -c Release -o publish -p:Version=${{ steps.version.outputs.version }}
      
      - name: Create ZIP
        if: steps.check_release.outputs.exists == 'false'
        run: Compress-Archive -Path publish/* -DestinationPath Checklist.zip

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          files: Checklist.zip
          generate_release_notes: true
          token: ${{ secrets.RELEASE_TOKEN }}
