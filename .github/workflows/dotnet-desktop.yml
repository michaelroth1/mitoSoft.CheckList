# This is a basic workflow creates a Release by Git tags 

# How to produce git tags: 
#
# C:\WS_GIT\michaelroth1\mitoSoft.CheckList>git tag v1.2
# 
# C:\WS_GIT\michaelroth1\mitoSoft.CheckList>git push origin v1.2
# Total 0 (delta 0), reused 0 (delta 0), pack-reused 0 (from 0)
# To https://github.com/michaelroth1/mitoSoft.CheckList
#  * [new tag]         v1.2 -> v1.2
# 
# C:\WS_GIT\michaelroth1\mitoSoft.CheckList>git tag v1.3.0
# 
# C:\WS_GIT\michaelroth1\mitoSoft.CheckList>git push origin v1.3.0
# Total 0 (delta 0), reused 0 (delta 0), pack-reused 0 (from 0)
# To https://github.com/michaelroth1/mitoSoft.CheckList
#  * [new tag]         v1.3.0 -> v1.3.0
# 
# C:\WS_GIT\michaelroth1\mitoSoft.CheckList>git tag v1.4.0
# 
# C:\WS_GIT\michaelroth1\mitoSoft.CheckList>git push origin v1.4.0
# Total 0 (delta 0), reused 0 (delta 0), pack-reused 0 (from 0)
# To https://github.com/michaelroth1/mitoSoft.CheckList
#  * [new tag]         v1.4.0 -> v1.4.0
# 
# C:\WS_GIT\michaelroth1\mitoSoft.CheckList>git tag
# v1.0
# v1.1
# v1.2
# v1.3.0
# v1.4.0
#************************************************************************

name: Build Release Zip

# Controls when the workflow will run
on:
  # workflow_dispatch
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    #branches: [ main ]
    tags:
      - "v*" #add git bash an use following commands: git tag v1.0.0, git push origin v1.0.0

env:
  PROJECT_FILE: mitoSoft.Checklist.csproj
  PROJECT_FOLDER: mitoSoft.Checklist
  ZIP_FILENAME: Checklist.zip
  
jobs:
  deploys:
    runs-on: windows-latest
    steps:     
      - uses: actions/checkout@v6
      
      - id: getversion
        uses: actions/github-script@v5
        with:
          script: |
            const version = "${{ github.ref }}".split('/')[2].replace('v','').replace('V','').replace('version','').replace('Version','')
            core.setOutput('version', version)
            
      - run: echo "${{steps.getversion.outputs.version}}"
      
      - uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 10.0.x
      
      - run: dotnet build ${{ env.PROJECT_FOLDER }}/${{ env.PROJECT_FILE }} -c Release /p:Version=${{steps.getversion.outputs.version}}
            
      - run: dotnet publish ${{ env.PROJECT_FOLDER }}/${{ env.PROJECT_FILE }} -c Release --no-build
      
      - uses: vimtor/action-zip@v1
        with:
          files:  ${{ env.PROJECT_FOLDER }}/bin/Release/net10.0-windows/publish/
          recursive: true
          dest:  ${{ env.ZIP_FILENAME }}
                
      - name: Build Release
        id: create_release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.RELEASE_TOKEN }}"
          prerelease: false
                  
      - uses: csexton/release-asset-action@v3
        with:
           github-token: ${{ secrets.RELEASE_TOKEN }}
           pattern: ${{ github.workspace }}/${{ env.ZIP_FILENAME }}
           release-url: ${{ steps.create_release.outputs.upload_url }}           
